<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FitTrack"/>
<meta name="theme-color" content="#0c0e0d"/>
<title>FitTrack — 12 Week</title>

<!-- PWA manifest inline via JS blob (no server needed) -->
<script>
const manifest = {
  name: "FitTrack 12-Week",
  short_name: "FitTrack",
  start_url: ".",
  display: "standalone",
  background_color: "#0c0e0d",
  theme_color: "#0c0e0d",
  description: "12-week personal fitness tracker",
  icons: [{
    src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='90' fill='%230c0e0d'/><text x='256' y='320' text-anchor='middle' font-size='280' font-family='serif'>💪</text></svg>`),
    sizes: "512x512",
    type: "image/svg+xml",
    purpose: "any maskable"
  }]
};
const blob = new Blob([JSON.stringify(manifest)], {type:"application/json"});
const url  = URL.createObjectURL(blob);
const link = document.createElement("link");
link.rel = "manifest"; link.href = url;
document.head.appendChild(link);
</script>

<!-- Service Worker for offline -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const sw = `
      const CACHE = 'fittrack-v1';
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', location.href])));
        self.skipWaiting();
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('./')))
        );
      });
    `;
    const blob = new Blob([sw], {type:'text/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob));
  });
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=DM+Mono:wght@400;700&display=swap" rel="stylesheet"/>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0c0e0d;
    --surface: #111413;
    --card:    #161a18;
    --border:  #1e2521;
    --accent:  #b8e62a;
    --amber:   #f0a832;
    --red:     #f03260;
    --cyan:    #32c8f0;
    --purple:  #a032f0;
    --muted:   #3a4a42;
    --text:    #dde8de;
    --dim:     #607568;
    --avgbg:   #0e1810;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', monospace;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  /* ── SHELL ─────────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* ── TOP HEADER ── */
  #header {
    flex-shrink: 0;
    background: linear-gradient(160deg, #0b1410, #111a13);
    border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 14px) 16px 12px;
  }
  #header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #header-eyebrow {
    font-size: 8px;
    letter-spacing: 0.24em;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 4px;
  }
  #header-title {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.07em;
    line-height: 1;
  }
  #header-title span { color: var(--accent); }
  #header-stats {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .stat-block { text-align: right; }
  .stat-num { font-size: 20px; font-weight: 700; line-height: 1; color: var(--accent); }
  .stat-num.amber { color: var(--amber); }
  .stat-lbl { font-size: 7px; color: var(--dim); letter-spacing: 0.14em; margin-top: 2px; }
  #save-badge {
    font-size: 8px; letter-spacing: 0.1em;
    padding: 3px 8px; border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--dim);
    transition: color 0.3s;
  }

  /* progress bar */
  #prog-bar-wrap { margin-top: 10px; }
  #prog-labels { display: flex; justify-content: space-between; font-size: 8px; color: var(--dim); letter-spacing: 0.1em; margin-bottom: 4px; }
  #prog-track { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  #prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--amber)); border-radius: 2px; transition: width 0.5s; }

  /* ── TAB BAR ── */
  #tabs {
    flex-shrink: 0;
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  #tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 10px 14px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    line-height: 1.3;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab .tab-date { font-size: 7px; color: var(--muted); font-weight: 400; display: block; margin-top: 2px; }
  .tab.partial { color: #6a8a40; }
  .tab.done { color: #3a5a30; }

  /* ── BODY PANELS ── */
  #body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* VIEW: LOG */
  #view-log {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }

  .week-log-table {
    width: 100%;
    border-collapse: collapse;
  }

  /* Column headers (sticky) */
  .week-log-table thead th {
    position: sticky;
    top: 0;
    z-index: 5;
    background: var(--surface);
    padding: 8px 6px 6px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.06em;
  }
  .week-log-table thead th:first-child {
    text-align: left;
    padding-left: 14px;
    min-width: 70px;
    font-size: 8px;
    color: var(--dim);
  }
  .th-icon { font-size: 14px; display: block; }
  .th-lbl  { font-size: 8px; font-weight: 700; letter-spacing: 0.06em; margin-top: 2px; }
  .th-unit { font-size: 7px; color: var(--dim); }

  /* Day rows */
  .day-row td {
    padding: 5px 6px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    text-align: center;
    vertical-align: middle;
  }
  .day-row td:first-child {
    text-align: left;
    padding-left: 14px;
    background: var(--card);
  }
  .day-row.weekend td { background: #0e1210; }
  .day-lbl { font-size: 9px; font-weight: 700; color: var(--dim); letter-spacing: 0.06em; }
  .day-lbl.we { color: var(--amber); }
  .day-date { font-size: 7px; color: var(--muted); margin-top: 1px; }

  input[type=number] {
    -moz-appearance: textfield;
    width: 58px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    text-align: center;
    padding: 3px 2px 2px;
    border-radius: 2px 2px 0 0;
    transition: border-color 0.12s, background 0.12s;
    -webkit-appearance: none;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number]:focus { outline: none; }
  input::placeholder { color: #1e2e22; }

  /* Avg row */
  .avg-row td {
    padding: 7px 6px;
    background: var(--avgbg);
    border-bottom: 2px solid var(--border);
    border-top: 1px solid rgba(184,230,42,0.15);
    text-align: center;
  }
  .avg-row td:first-child { padding-left: 14px; text-align: left; }
  .avg-lbl { font-size: 8px; font-weight: 700; letter-spacing: 0.15em; color: var(--accent); }
  .avg-val { font-size: 12px; font-weight: 700; }
  .avg-unit { font-size: 7px; color: var(--dim); margin-left: 2px; }

  /* VIEW: COMPARE */
  #view-compare {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    padding: 12px 12px 40px;
  }
  .compare-section { margin-bottom: 24px; }
  .compare-heading {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .compare-icon { font-size: 18px; }
  .compare-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; }
  .compare-unit  { font-size: 9px; color: var(--dim); }

  .compare-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .compare-cell {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 6px;
    text-align: center;
    position: relative;
    transition: background 0.2s;
  }
  .compare-cell.best {
    border-top-width: 2px;
  }
  .compare-cell .wk-num { font-size: 8px; color: var(--dim); letter-spacing: 0.1em; margin-bottom: 4px; }
  .compare-cell .wk-val { font-size: 15px; font-weight: 700; line-height: 1; }
  .compare-cell .wk-date { font-size: 7px; color: var(--muted); margin-top: 3px; }
  .compare-cell.empty .wk-val { color: var(--muted); font-size: 12px; }

  /* bottom safe area padding */
  #view-log::after, #view-compare::after {
    content: '';
    display: block;
    height: calc(var(--safe-bot) + 16px);
  }

  /* bottom nav bar */
  #bottom-nav {
    flex-shrink: 0;
    display: flex;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding-bottom: var(--safe-bot);
  }
  .nav-btn {
    flex: 1;
    padding: 10px 8px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--dim);
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .nav-btn .nb-icon { font-size: 18px; }
  .nav-btn.active { color: var(--accent); }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="header-top">
      <div>
        <div id="header-eyebrow">12-WEEK · 25 MAY → 16 AUG 2026</div>
        <div id="header-title">FIT<span>TRACK</span></div>
      </div>
      <div id="header-stats">
        <div class="stat-block">
          <div class="stat-num" id="stat-entries">0</div>
          <div class="stat-lbl">ENTRIES</div>
        </div>
        <div class="stat-block">
          <div class="stat-num amber" id="stat-pct">0%</div>
          <div class="stat-lbl">DONE</div>
        </div>
        <div id="save-badge">✓ SAVED</div>
      </div>
    </div>
    <div id="prog-bar-wrap">
      <div id="prog-labels"><span>PROGRESS</span><span id="prog-count">0 / 420</span></div>
      <div id="prog-track"><div id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- TAB BAR (week selector, shown in log view) -->
  <div id="tabs"></div>

  <!-- BODY -->
  <div id="body">
    <div id="view-log"></div>
    <div id="view-compare" style="display:none"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div id="bottom-nav">
    <button class="nav-btn active" id="nav-log" onclick="showView('log')">
      <span class="nb-icon">📋</span>LOG
    </button>
    <button class="nav-btn" id="nav-compare" onclick="showView('compare')">
      <span class="nb-icon">📊</span>COMPARE
    </button>
  </div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const STORAGE_KEY = "fittrack_pwa_v1";

const FIELDS = [
  { key:"weight",   label:"Weight",  unit:"kg",   icon:"⚖️",  dec:1, ph:"75.0",  color:"#b8e62a" },
  { key:"steps",    label:"Steps",   unit:"k",    icon:"👟",  dec:1, ph:"8.0",   color:"#f0a832" },
  { key:"calories", label:"Kcal",    unit:"cal",  icon:"🔥",  dec:0, ph:"2200",  color:"#f03260" },
  { key:"km",       label:"KM Ran",  unit:"km",   icon:"🏃",  dec:1, ph:"5.0",   color:"#32c8f0" },
  { key:"gym",      label:"Gym",     unit:"✓",    icon:"💪",  dec:0, ph:"1",     color:"#a032f0" },
];

const START = new Date(2026, 4, 25); // Mon 25 May

function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate() + n); return r;
}
function fmtShort(d) {
  return d.toLocaleDateString("en-GB", { day:"numeric", month:"short" });
}
function fmtDay(d) {
  return d.toLocaleDateString("en-GB", { weekday:"short" });
}

// 12 weeks × 7 days of Date objects
const WEEKS = Array.from({length:12}, (_,wi) =>
  Array.from({length:7}, (_,di) => addDays(START, wi*7+di))
);

const emptyDay  = () => FIELDS.reduce((a,{key}) => ({...a,[key]:""}), {});
const emptyData = () => Array.from({length:12}, () => Array.from({length:7}, emptyDay));

function load() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : emptyData(); }
  catch { return emptyData(); }
}

let DATA = load();
let saveTimer = null;

function save() {
  clearTimeout(saveTimer);
  const badge = document.getElementById("save-badge");
  badge.textContent = "SAVING…";
  badge.style.color = "#f0a832";
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); } catch {}
    badge.textContent = "✓ SAVED";
    badge.style.color = "";
    updateStats();
  }, 500);
}

function weekAvg(wi) {
  return FIELDS.reduce((acc,{key,dec}) => {
    const vals = DATA[wi].map(d => parseFloat(d[key])).filter(v => !isNaN(v));
    acc[key] = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(dec) : null;
    return acc;
  }, {});
}

function updateStats() {
  const total = 12 * 7 * FIELDS.length;
  const filled = DATA.reduce((a,w) => a + w.reduce((b,d) =>
    b + FIELDS.filter(({key}) => d[key] !== "").length, 0), 0);
  const pct = Math.round(filled/total*100);
  document.getElementById("stat-entries").textContent = filled;
  document.getElementById("stat-pct").textContent = pct + "%";
  document.getElementById("prog-count").textContent = filled + " / " + total;
  document.getElementById("prog-fill").style.width = pct + "%";
  updateTabStyles();
}

// ── CURRENT VIEW / WEEK ───────────────────────────────────────────────────────
let activeView = "log";
let activeWeek = 0;

function showView(v) {
  activeView = v;
  document.getElementById("view-log").style.display     = v === "log"     ? "block" : "none";
  document.getElementById("view-compare").style.display = v === "compare" ? "block" : "none";
  document.getElementById("tabs").style.display         = v === "log"     ? "flex"  : "none";
  document.getElementById("nav-log").classList.toggle("active",     v === "log");
  document.getElementById("nav-compare").classList.toggle("active", v === "compare");
  if (v === "compare") renderCompare();
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function buildTabs() {
  const container = document.getElementById("tabs");
  container.innerHTML = "";
  WEEKS.forEach((wDays, wi) => {
    const btn = document.createElement("button");
    btn.className = "tab";
    btn.id = `tab-${wi}`;
    btn.innerHTML = `W${wi+1}<span class="tab-date">${fmtShort(wDays[0])}</span>`;
    btn.onclick = () => selectWeek(wi);
    container.appendChild(btn);
  });
}

function updateTabStyles() {
  WEEKS.forEach((_, wi) => {
    const btn = document.getElementById(`tab-${wi}`);
    if (!btn) return;
    const filled = DATA[wi].reduce((a,d) => a + FIELDS.filter(({key}) => d[key] !== "").length, 0);
    const total  = 7 * FIELDS.length;
    btn.classList.toggle("active",   wi === activeWeek);
    btn.classList.toggle("done",     filled === total && wi !== activeWeek);
    btn.classList.toggle("partial",  filled > 0 && filled < total && wi !== activeWeek);
  });
  // scroll active tab into view
  const activeTab = document.getElementById(`tab-${activeWeek}`);
  if (activeTab) activeTab.scrollIntoView({behavior:"smooth", block:"nearest", inline:"center"});
}

function selectWeek(wi) {
  activeWeek = wi;
  renderLog();
  updateTabStyles();
}

// ── LOG VIEW ──────────────────────────────────────────────────────────────────
function renderLog() {
  const avgs = weekAvg(activeWeek);
  const wDays = WEEKS[activeWeek];

  let html = `<table class="week-log-table">
  <thead><tr>
    <th><span style="font-size:8px;letter-spacing:.12em;color:var(--dim)">DATE</span></th>`;

  FIELDS.forEach(({label,unit,icon,color}) => {
    html += `<th style="color:${color}">
      <span class="th-icon">${icon}</span>
      <span class="th-lbl" style="color:${color}">${label}</span>
      <span class="th-unit">${unit}</span>
    </th>`;
  });
  html += `</tr></thead><tbody>`;

  // 7 day rows
  wDays.forEach((date, di) => {
    const isWE = di >= 5;
    const dayClass = isWE ? "day-row weekend" : "day-row";
    html += `<tr class="${dayClass}">
      <td>
        <div class="day-lbl ${isWE?'we':''}">${fmtDay(date)}</div>
        <div class="day-date">${fmtShort(date)}</div>
      </td>`;

    FIELDS.forEach(({key,dec,ph,color}) => {
      const val = DATA[activeWeek][di][key];
      const hasVal = val !== "";
      html += `<td>
        <input type="number" min="0" step="${dec>0?0.1:1}"
          value="${val}"
          placeholder="${ph}"
          data-wi="${activeWeek}" data-di="${di}" data-key="${key}"
          style="border-bottom-color:${hasVal ? color+'77' : 'var(--border)'};color:${hasVal?'var(--text)':'var(--dim)'}"
          oninput="handleInput(this)"
          onfocus="this.style.borderBottomColor='${color}';this.style.background='${color}0a'"
          onblur="this.style.borderBottomColor=this.value?'${color}77':'var(--border)';this.style.background='transparent'"
        />
      </td>`;
    });
    html += `</tr>`;
  });

  // Avg row
  html += `<tr class="avg-row"><td><span class="avg-lbl">WK AVG</span></td>`;
  FIELDS.forEach(({key,unit,color}) => {
    const v = avgs[key];
    html += `<td>${v !== null
      ? `<span class="avg-val" style="color:${color}">${v}</span><span class="avg-unit">${unit}</span>`
      : `<span style="color:var(--muted);font-size:11px">—</span>`
    }</td>`;
  });
  html += `</tr></tbody></table>`;

  document.getElementById("view-log").innerHTML = html;
}

function handleInput(el) {
  const wi  = parseInt(el.dataset.wi);
  const di  = parseInt(el.dataset.di);
  const key = el.dataset.key;
  DATA[wi][di][key] = el.value;
  save();
  // live-update avg row without full re-render
  updateAvgRow(wi);
}

function updateAvgRow(wi) {
  if (wi !== activeWeek) return;
  const avgs = weekAvg(wi);
  const avgCells = document.querySelectorAll(".avg-row td");
  if (!avgCells.length) return;
  FIELDS.forEach(({key,unit,color}, fi) => {
    const cell = avgCells[fi+1];
    if (!cell) return;
    const v = avgs[key];
    cell.innerHTML = v !== null
      ? `<span class="avg-val" style="color:${color}">${v}</span><span class="avg-unit">${unit}</span>`
      : `<span style="color:var(--muted);font-size:11px">—</span>`;
  });
}

// ── COMPARE VIEW ──────────────────────────────────────────────────────────────
function renderCompare() {
  const allAvgs = Array.from({length:12}, (_,wi) => weekAvg(wi));
  let html = "";

  FIELDS.forEach(({key,label,unit,icon,color,dec}) => {
    html += `<div class="compare-section">
      <div class="compare-heading">
        <span class="compare-icon">${icon}</span>
        <span class="compare-title" style="color:${color}">${label}</span>
        <span class="compare-unit">${unit}</span>
      </div>
      <div class="compare-grid">`;

    // find best value
    const nums = allAvgs.map(a => a[key] !== null ? parseFloat(a[key]) : null).filter(v => v !== null);
    const isBetter = key !== "weight";
    const best = nums.length ? (isBetter ? Math.max(...nums) : Math.min(...nums)) : null;

    allAvgs.forEach((avgs, wi) => {
      const v   = avgs[key];
      const num = v !== null ? parseFloat(v) : null;
      const isPeak = num !== null && num === best;
      html += `<div class="compare-cell ${isPeak?'best':''}${v===null?'empty':''}" style="${isPeak?`border-color:${color};background:${color}15`:''}">
        <div class="wk-num">W${wi+1}</div>
        <div class="wk-val" style="color:${v!==null?(isPeak?color:'var(--text)'):'var(--muted)'}">${v!==null?v:'—'}</div>
        <div class="wk-date">${fmtShort(WEEKS[wi][0])}</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById("view-compare").innerHTML = html;
}
